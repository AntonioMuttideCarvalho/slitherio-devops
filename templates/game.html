<!DOCTYPE html>
<html>
<head>
    <title>Slither.io - Jogo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>
    <div class="game-container">
        <div class="scoreboard">
            <h3>🏆 TOP PLAYERS</h3>
            <div id="scores-list"></div>
        </div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="player-info">Jogando como: <strong>{{ player_name }}</strong></div>
    </div>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const playerName = '{{ player_name }}';
        
        const socket = io();
        let players = {};
        let foods = [];
        let myId = null;
        
        socket.on('connect', () => {
            myId = socket.id;
            socket.emit('join', { name: playerName });
        });
        
        socket.on('game_state', (data) => {
            players = data.players;
            foods = data.foods;
            updateScores(data.scores);
        });
        
        socket.on('update_players', (updatedPlayers) => {
            players = updatedPlayers;
        });
        
        socket.on('update_scores', (scores) => {
            updateScores(scores);
        });
        
        function updateScores(scores) {
            const scoresDiv = document.getElementById('scores-list');
            scoresDiv.innerHTML = scores.map((s, i) => 
                `<div class="score-item ${s[0] === playerName ? 'me' : ''}">
                    ${i+1}. ${s[0]} - ${s[1]} pts
                </div>`
            ).join('');
        }
        
        let mouseX = 400, mouseY = 300;
        
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
            if (myId && players[myId]) {
                socket.emit('move', { x: mouseX, y: mouseY });
            }
        });
        
        function draw() {
            ctx.clearRect(0, 0, 800, 600);
            
            foods.forEach(food => {
                ctx.fillStyle = '#ff4444';
                ctx.beginPath();
                ctx.arc(food.x, food.y, 8, 0, Math.PI * 2);
                ctx.fill();
            });
            
            Object.keys(players).forEach(id => {
                const p = players[id];
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 12, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.font = '12px Arial';
                ctx.fillText(p.name, p.x - 20, p.y - 15);
                ctx.fillText(`${p.score}`, p.x - 10, p.y + 25);
            });
            
            requestAnimationFrame(draw);
        }
        
        draw();
    </script>
</body>
</html>
